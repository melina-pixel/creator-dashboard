name: Weekly dashboard refresh

on:
  schedule:
    - cron: "27 10 * * *"   # daily 10:27 UTC = 12:27 Stockholm
  workflow_dispatch: {}    # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install google-api-python-client google-auth

      - name: Rebuild index.html from Google Sheet
        env:
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python3 build.py

      - name: Commit refreshed data
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add index.html
          git commit -m "weekly refresh $(date -u +%Y-%m-%d)" || echo "no changes to commit"
          git push || echo "push skipped"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
