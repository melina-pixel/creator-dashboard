name: Weekly dashboard refresh

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC = 08:00 Stockholm (summer)
  workflow_dispatch: {}    # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install google-api-python-client google-auth

      - name: Rebuild index.html from Google Sheet
        env:
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python3 build.py

      - name: Commit + push refreshed data (Vercel auto-deploys on push)
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add index.html
          git commit -m "weekly refresh $(date -u +%Y-%m-%d)" || echo "no changes to commit"
          git push
